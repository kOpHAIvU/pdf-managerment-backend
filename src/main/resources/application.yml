google:
  client-id: ${GOOGLE_CLIENT_ID:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

spring:
  application:
    name: pdf-desk-backend

  graphql:
    path: /graphql
    graphiql:
      enabled: true

server:
  port: 8080

logging:
  level:
    com.pdfdesk.service.auth: INFO
    com.pdfdesk.service.google: INFO
