google:
  client-id: ${GOOGLE_CLIENT_ID:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

spring:
  application:
    name: pdf-desk-backend

  graphql:
    path: /graphql
    graphiql:
      enabled: true
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_FILE_SIZE:10MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:10MB}

server:
  port: 8080

storage:
  local:
    upload-dir: ${LOCAL_UPLOAD_DIR:uploads}

logging:
  level:
    com.pdfdesk.service.auth: INFO
    com.pdfdesk.service.google: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} traceId=%X{traceId} spanId=%X{spanId} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

security:
  jwt:
    secret: ${JWT_SECRET:replace-with-a-long-random-secret-key-at-least-32-bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  rate-limit:
    capacity: ${RATE_LIMIT_CAPACITY:120}
    refill-per-minute: ${RATE_LIMIT_REFILL_PER_MINUTE:120}
